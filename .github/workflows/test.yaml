name: Test
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Run Tests
      run: npm run test
      if: runner.os == 'Linux'

    - name: Generate coverage badge
      uses: jaywcjlove/coverage-badges-cli@main
      with:
        source: coverage/coverage-summary.json
        output: coverage/badge.svg

    # vsceでパッケージングしたところ、SVG は README に含めれらなかったので PNG に変換
    # 類似 issue: https://github.com/microsoft/vscode-vsce/issues/183
    - name: Convert SVG to PNG
      uses: linrock/svg-to-png-action@only-convert
      with:
        svg-file: coverage/badge.svg
        png-file: coverage/badge.png

    - name: Push coverage badge
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./coverage
        destination_dir: coverage
